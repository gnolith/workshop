name: Taproot peer conformance

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  packed-peer-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Pack the statement-text Taproot source
        env:
          TAPROOT_COMMIT: 38b97616da07ee349cf30877653acd84d1689139
        run: |
          git clone --filter=blob:none https://github.com/gnolith/taproot.git "$RUNNER_TEMP/taproot"
          git -C "$RUNNER_TEMP/taproot" checkout --detach "$TAPROOT_COMMIT"
          test "$(git -C "$RUNNER_TEMP/taproot" rev-parse HEAD)" = "$TAPROOT_COMMIT"
          npm ci --prefix "$RUNNER_TEMP/taproot"
          npm pack "$RUNNER_TEMP/taproot" --pack-destination "$RUNNER_TEMP"
      - name: Verify exact typed boundary between packed peers
        run: |
          npm pack . --pack-destination "$RUNNER_TEMP"
          mkdir "$RUNNER_TEMP/peer-consumer"
          cd "$RUNNER_TEMP/peer-consumer"
          npm init --yes
          # The pinned source still reports its pre-release 0.2.0 package
          # version. Bypass semver resolution only in this source-conformance
          # fixture; Workshop's published peer floor remains the honest 0.3.x.
          npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund \
            "$RUNNER_TEMP/gnolith-taproot-0.2.0.tgz" \
            "$RUNNER_TEMP/gnolith-workshop-0.2.3.tgz"
          cat > conformance.ts <<'EOF'
          import type { TaprootRepository } from '@gnolith/taproot';
          import type { TaprootRepositoryLike } from '@gnolith/workshop/server';

          declare const actual: TaprootRepository;
          const compatible: TaprootRepositoryLike = actual;
          void compatible;
          EOF
          node "$GITHUB_WORKSPACE/node_modules/typescript/bin/tsc" \
            --noEmit --strict --skipLibCheck --target ES2022 \
            --module NodeNext --moduleResolution NodeNext conformance.ts
