name: Taproot peer conformance

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  packed-peer-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Pack the authorization-foundation Taproot source
        env:
          TAPROOT_COMMIT: 9b7eb5de694e6020ce8466e01687b8077fbf915c
        run: |
          git clone --filter=blob:none https://github.com/gnolith/taproot.git "$RUNNER_TEMP/taproot"
          git -C "$RUNNER_TEMP/taproot" checkout --detach "$TAPROOT_COMMIT"
          test "$(git -C "$RUNNER_TEMP/taproot" rev-parse HEAD)" = "$TAPROOT_COMMIT"
          npm ci --prefix "$RUNNER_TEMP/taproot"
          npm pack "$RUNNER_TEMP/taproot" --pack-destination "$RUNNER_TEMP"
      - name: Install exact packed peers
        run: |
          npm pack . --pack-destination "$RUNNER_TEMP"
          mkdir "$RUNNER_TEMP/peer-consumer"
          cd "$RUNNER_TEMP/peer-consumer"
          npm init --yes
          npm install --legacy-peer-deps --ignore-scripts --no-audit --no-fund \
            "$RUNNER_TEMP/gnolith-taproot-0.3.0.tgz" \
            "$RUNNER_TEMP/gnolith-workshop-0.3.3.tgz" \
            "@gnolith/diamond@0.4.0" \
            "miniflare@4.20260714.0"
          cp "$GITHUB_WORKSPACE/.github/scripts/taproot-peer-conformance.ts" conformance.ts
          cp "$GITHUB_WORKSPACE/.github/scripts/taproot-runtime-conformance.mjs" conformance.mjs
          cp "$GITHUB_WORKSPACE/.github/scripts/taproot-d1-runtime-conformance.mjs" conformance-d1.mjs
      - name: Verify exact typed boundary between packed peers
        run: |
          cd "$RUNNER_TEMP/peer-consumer"
          node "$GITHUB_WORKSPACE/node_modules/typescript/bin/tsc" \
            --noEmit --strict --skipLibCheck --target ES2022 \
            --module NodeNext --moduleResolution NodeNext conformance.ts
      - name: Verify packed runtime authorization guard
        run: node "$RUNNER_TEMP/peer-consumer/conformance.mjs"
      - name: Verify packed persisted D1 authorization guard
        run: node "$RUNNER_TEMP/peer-consumer/conformance-d1.mjs"
