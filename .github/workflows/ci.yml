name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Verify release credential boundary
        run: node .github/scripts/verify-release-boundary.mjs
      - name: Test release source identity failures
        run: node .github/scripts/test-release-boundary-runtime.mjs

  check:
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check

  format-windows-autocrlf:
    runs-on: windows-latest
    steps:
      - name: Configure CRLF-prone Git checkout
        run: git config --global core.autocrlf true
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify LF policy and formatting
        shell: pwsh
        run: |
          if ((git config --global --get core.autocrlf) -ne 'true') {
            throw 'Expected core.autocrlf=true before checkout'
          }
          if ((git check-attr eol -- README.md) -notmatch 'eol: lf$') {
            throw 'Repository attributes did not enforce LF'
          }
          npm run format:check
