name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: github.repository == 'gnolith/workshop'
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run check
      - run: npm run release:check -- "${{ github.event.release.tag_name }}"
      - name: Persist immutable provenance assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          archive="$(npm run --silent artifact:path)"
          provenance="${archive%.tgz}.provenance.json"
          schema=".release/gnolith-workshop-${RELEASE_TAG#v}.provenance.schema.json"
          cp docs/release-provenance.schema.json "$schema"
          gh release upload "$RELEASE_TAG" "$provenance" "$schema"
      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: npm publish "$(npm run --silent artifact:path)" --access public --provenance
